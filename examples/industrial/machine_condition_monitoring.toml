# Example: Machine Condition Monitoring
# Focuses on rotating equipment health signals such as vibration, temperature, RPM, power, and state.
# Comments point out the important pieces so you can copy just the parts you need.
# Full schema reference: https://github.com/marcelo-6/mqtt-sim/tree/main/docs/configuration.md

config_version = 1
name = "Machine Condition Monitoring"

# Broker connection settings. Omit `port` here because the default MQTT port is already 1883.
[brokers.main]
host = "localhost"

# Most examples keep a single named client to stay compact and easy to edit.
[clients.main]
broker = "main"
id = "industrial-machine-condition-monitoring-sim"


# Stream: motor_vibration
# Topic: industrial/machine-a/condition/vibration
[[streams]]
name = "motor_vibration"
client = "main"
topic = "industrial/machine-a/condition/vibration"
every = "500ms"
qos = 1

# Inline JSON payload for this stream.
[streams.payload.json]
# Sample `velocity_mm_s` randomly inside the configured range on each publish.
velocity_mm_s = { random = { type = "float", min = 0.3, max = 7.5, precision = 2 } }
# Choose `severity` from a small set of named states or labels on each publish.
severity = { pick = ["normal", "watch", "warning"] }


# Stream: bearing_temperature
# Topic: industrial/machine-a/condition/bearing-temp
[[streams]]
name = "bearing_temperature"
client = "main"
topic = "industrial/machine-a/condition/bearing-temp"
every = "1s"
qos = 1

# Inline JSON payload for this stream.
[streams.payload.json]
# Recompute `temp_c` from the previous value so it drifts smoothly instead of jumping around.
temp_c = { expr = "(prev or 62.0) + uniform(-0.4, 0.6)" }
# Pick a value for `alarm` from the configured list each time this stream publishes.
alarm = { pick = [false, false, false, true] }


# Stream: shaft_rpm
# Topic: industrial/machine-a/condition/shaft-rpm
[[streams]]
name = "shaft_rpm"
client = "main"
topic = "industrial/machine-a/condition/shaft-rpm"
every = "700ms"

# Inline JSON payload for this stream.
[streams.payload.json]
# Walk `rpm` through its configured range in fixed increments instead of pure random jumps.
rpm = { walk = { type = "int", min = 1400, max = 1800, step = 50, start = 1600 } }


# Stream: power_draw
# Topic: industrial/machine-a/condition/power
[[streams]]
name = "power_draw"
client = "main"
topic = "industrial/machine-a/condition/power"
every = "800ms"

# Inline JSON payload for this stream.
[streams.payload.json]
# Sample `kw` randomly inside a plausible range for this kind of telemetry.
kw = { random = { type = "float", min = 3.5, max = 7.8, precision = 2 } }
# Sample `power_factor` randomly inside a plausible range for this kind of telemetry.
power_factor = { random = { type = "float", min = 0.84, max = 0.99, precision = 3 } }


# Stream: machine_state
# Topic: industrial/machine-a/state-machine
[[streams]]
name = "machine_state"
client = "main"
topic = "industrial/machine-a/state-machine"
every = "1500ms"
retain = true

# Inline JSON payload for this stream.
[streams.payload.json]
# Step `state` through a repeating sequence so this stream follows a recognizable progression.
state = { seq = ["idle", "starting", "running", "running", "stopping"] }
# Generate a fresh unique identifier for `batch_id` on every publish.
batch_id = { uuid = true }
