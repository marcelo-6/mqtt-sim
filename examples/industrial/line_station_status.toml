# Example: Line Station Status
# Simulates a production line station with state, cycle timing, rejects, throughput, and alarm events.
# Comments point out the important pieces so you can copy just the parts you need.
# Full schema reference: https://github.com/marcelo-6/mqtt-sim/tree/main/docs/configuration.md

config_version = 1
name = "Line Station Status"

# Broker connection settings. Omit `port` here because the default MQTT port is already 1883.
[brokers.main]
host = "localhost"

# Most examples keep a single named client to stay compact and easy to edit.
[clients.main]
broker = "main"
id = "industrial-line-station-status-sim"


# Stream: station_state_machine
# Topic: industrial/line-1/station-3/state-machine
[[streams]]
name = "station_state_machine"
client = "main"
topic = "industrial/line-1/station-3/state-machine"
every = "900ms"
retain = true

# Inline JSON payload for this stream.
[streams.payload.json]
# Step `state` through a repeating sequence so this stream follows a recognizable progression.
state = { seq = ["idle", "load", "process", "inspect", "unload"] }
# Increment `step` from the previous value to show the state machine advancing one step at a time.
step = { expr = "(prev or 0) + 1" }


# Stream: cycle_time
# Topic: industrial/line-1/station-3/cycle-time
[[streams]]
name = "cycle_time"
client = "main"
topic = "industrial/line-1/station-3/cycle-time"
every = "900ms"

# Inline JSON payload for this stream.
[streams.payload.json]
# Sample `cycle_time_s` randomly inside the configured range on each publish.
cycle_time_s = { random = { type = "float", min = 7.2, max = 10.8, precision = 2 } }


# Stream: reject_count
# Topic: industrial/line-1/station-3/rejects
[[streams]]
name = "reject_count"
client = "main"
topic = "industrial/line-1/station-3/rejects"
every = "1500ms"

# Inline JSON payload for this stream.
[streams.payload.json]
# Recompute `count` from the previous value so it keeps accumulating over time.
count = { expr = "(prev or 0) + randint(0, 1)" }
# Choose `reason` from a small set of named states or labels on each publish.
reason = { pick = ["none", "vision", "dimension", "presence"] }


# Stream: throughput
# Topic: industrial/line-1/station-3/throughput
[[streams]]
name = "throughput"
client = "main"
topic = "industrial/line-1/station-3/throughput"
every = "2s"

# Inline JSON payload for this stream.
[streams.payload.json]
# Walk `parts_per_min` through its configured range in fixed increments on each publish.
parts_per_min = { walk = { type = "int", min = 12, max = 26, step = 2, start = 18 } }


# Stream: alarm_events
# Topic: industrial/line-1/station-3/alarms
[[streams]]
name = "alarm_events"
client = "main"
topic = "industrial/line-1/station-3/alarms"
every = "3s"

# Sequence payload: cycles through known values to emulate a deterministic event flow.
[streams.payload.sequence]
format = "json"
items = [
  { alarm = false, code = "NONE" },
  { alarm = true, code = "E112", message = "Sensor timeout" },
  { alarm = false, code = "NONE" },
  { alarm = true, code = "E204", message = "Guard open" },
]
