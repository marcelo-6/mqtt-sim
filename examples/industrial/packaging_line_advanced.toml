# Example: Packaging Line Advanced
# This is a compact showcase of the new schema's best features:
# named clients, lifecycle messages, nested JSON payloads, and richer schedules.
# Full schema reference: https://github.com/marcelo-6/mqtt-sim/tree/main/docs/configuration.md

config_version = 1
name = "Packaging Line Advanced"

[brokers.main]
host = "localhost"

# This client expands into one MQTT session per line/cell pair because its
# client id and lifecycle topics use the same `${line}` and `${cell}` variables
# that the production streams expand with below.
[clients.line_station]
broker = "main"
id = "line-${line}-cell-${cell}"

[clients.line_station.lifecycle.online]
topic = "factory/${line}/${cell}/lifecycle"
retain = true
qos = 1

[clients.line_station.lifecycle.online.payload.json]
# Keep `state` fixed for this stream so the other fields carry the variation.
state = "online"
# Keep `source` fixed for this stream so the other fields carry the variation.
source = "mqtt-sim"
# Stamp `ts` with the current UNIX time so subscribers can track freshness.
ts = { time = "unix" }

[clients.line_station.lifecycle.offline]
topic = "factory/${line}/${cell}/lifecycle"
retain = true
qos = 1

[clients.line_station.lifecycle.offline.payload.json]
# Keep `state` fixed for this stream so the other fields carry the variation.
state = "offline"
# Keep `reason` fixed for this stream so the other fields carry the variation.
reason = "graceful-stop"
# Stamp `ts` with the current UNIX time so subscribers can track freshness.
ts = { time = "unix" }

[clients.line_station.lifecycle.will]
topic = "factory/${line}/${cell}/lifecycle"
retain = true
qos = 1

[clients.line_station.lifecycle.will.payload.json]
# Keep `state` fixed for this stream so the other fields carry the variation.
state = "offline"
# Keep `reason` fixed for this stream so the other fields carry the variation.
reason = "unexpected-disconnect"
# Stamp `ts` with the current UNIX time so subscribers can track freshness.
ts = { time = "unix" }

# A second client keeps reference or back-office style streams separate from
# the expanded line stations.
[clients.backoffice]
broker = "main"
id = "packaging-backoffice"

# Stream: cell_status
# Slow-changing production status with nested KPI fields.
[[streams]]
name = "cell_status"
client = "line_station"
topic = "factory/${line}/${cell}/status"
every = "2s"
qos = 1
retain = true

[streams.expand]
line = { list = ["line-a", "line-b"] }
cell = { range = [1, 3] }

[streams.payload.json]
# Copy the expanded `line` value into the payload so subscribers can see which instance this message belongs to.
line = "${line}"
# Copy the expanded `cell` value into the payload so subscribers can see which instance this message belongs to.
cell = "${cell}"
# Choose `state` from a small set of named states or labels on each publish.
state = { pick = ["idle", "running", "changeover", "starved", "blocked"] }
# Choose `batch_code` from a small set of named states or labels on each publish.
batch_code = { pick = ["B-1042", "B-1043", "B-1044"] }
# Increment `good_units` by the configured step each time the stream publishes.
good_units = { counter = { start = 0, step = 1 } }
# Sample `reject_units` randomly inside the configured range on each publish.
reject_units = { random = { type = "int", min = 0, max = 2 } }
# Stamp `ts` with the current UNIX time so subscribers can track freshness.
ts = { time = "unix" }

[streams.payload.json.metrics]
# Sample `oee` randomly inside a plausible range for this kind of telemetry.
oee = { random = { type = "float", min = 0.82, max = 0.98, precision = 3 } }
# Sample `availability` randomly inside a plausible range for this kind of telemetry.
availability = { random = { type = "float", min = 0.9, max = 0.99, precision = 3 } }
# Sample `performance` randomly inside a plausible range for this kind of telemetry.
performance = { random = { type = "float", min = 0.88, max = 0.99, precision = 3 } }
# Sample `quality` randomly inside a plausible range for this kind of telemetry.
quality = { random = { type = "float", min = 0.97, max = 1.0, precision = 3 } }

# Stream: motor_telemetry
# Fixed-rate telemetry is useful when you want more clock-like sampling.
[[streams]]
name = "motor_telemetry"
client = "line_station"
topic = "factory/${line}/${cell}/motor"
every = "500ms"
mode = "fixed-rate"
jitter = "75ms"
qos = 1

[streams.expand]
line = { list = ["line-a", "line-b"] }
cell = { range = [1, 3] }

[streams.payload.json]
# Copy the expanded `line` value into the payload so subscribers can see which instance this message belongs to.
line = "${line}"
# Copy the expanded `cell` value into the payload so subscribers can see which instance this message belongs to.
cell = "${cell}"
# Walk `rpm` through its configured range in fixed increments instead of pure random jumps.
rpm = { walk = { type = "int", min = 900, max = 1800, step = 50, start = 1100 } }
# Sample `current_a` randomly inside a plausible range for this kind of telemetry.
current_a = { random = { type = "float", min = 2.0, max = 9.8, precision = 2 } }
# Recompute `temp_c` from the previous value so it drifts smoothly instead of jumping around.
temp_c = { expr = "(prev or 42.0) + uniform(-0.2, 0.4)" }
# Sample `vibration_mm_s` randomly inside a plausible range for this kind of telemetry.
vibration_mm_s = { random = { type = "float", min = 0.4, max = 3.2, precision = 2 } }
# Stamp `ts` with the current UNIX time so subscribers can track freshness.
ts = { time = "unix" }

[streams.payload.json.vfd]
# Choose `mode` from a small set of named states or labels on each publish.
mode = { pick = ["auto", "manual"] }
# Sample `load_pct` randomly inside the configured range on each publish.
load_pct = { random = { type = "int", min = 35, max = 92 } }

# Stream: alarm_events
# Burst mode emits small clusters of alarm traffic instead of a single message.
[[streams]]
name = "alarm_events"
client = "line_station"
topic = "factory/${line}/${cell}/alarm"
every = "10s"
mode = "burst"
burst_count = 3
burst_spacing = "250ms"
qos = 1

[streams.expand]
line = { list = ["line-a", "line-b"] }
cell = { range = [1, 3] }

[streams.payload.sequence]
format = "json"
items = [
  { severity = "info", code = "none", active = false },
  { severity = "warn", code = "door-open", active = true },
  { severity = "warn", code = "label-roll-low", active = true },
  { severity = "critical", code = "e-stop", active = true },
]

# Stream: reference_heartbeat
# A simple static reference stream from a different client.
[[streams]]
name = "reference_heartbeat"
client = "backoffice"
topic = "factory/reference/heartbeat"
every = "30s"
retain = true

[streams.payload.text]
value = "packaging-line-ok"
