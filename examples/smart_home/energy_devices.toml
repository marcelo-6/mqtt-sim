# Example: Energy Devices
# Simulates power-consuming and power-producing smart-home devices with energy-focused telemetry.
# Comments point out the important pieces so you can copy just the parts you need.
# Full schema reference: https://github.com/marcelo-6/mqtt-sim/tree/main/docs/configuration.md

config_version = 1
name = "Energy Devices"

# Broker connection settings. Omit `port` here because the default MQTT port is already 1883.
[brokers.main]
host = "localhost"

# Most examples keep a single named client to stay compact and easy to edit.
[clients.main]
broker = "main"
id = "smart-home-energy-devices-sim"


# Stream: smart_plug_coffee_corner
# Topic: smart-home/energy/smart-plug/coffee-corner
[[streams]]
name = "smart_plug_coffee_corner"
client = "main"
topic = "smart-home/energy/smart-plug/coffee-corner"
every = "1s"

# Inline JSON payload for this stream.
[streams.payload.json]
# Flip `on` between true and false on each publish.
on = { toggle = true }
# Sample `power_w` randomly inside a plausible range for this kind of telemetry.
power_w = { random = { type = "int", min = 0, max = 1800 } }
# Recompute `energy_wh` from the previous value so it keeps accumulating over time.
energy_wh = { expr = "(prev or 0) + randint(0, 25)" }


# Stream: ev_charger
# Topic: smart-home/energy/ev-charger/state
[[streams]]
name = "ev_charger"
client = "main"
topic = "smart-home/energy/ev-charger/state"
every = "2s"
retain = true

# Inline JSON payload for this stream.
[streams.payload.json]
# Choose `status` from a small set of named states or labels on each publish.
status = { pick = ["idle", "charging", "scheduled", "complete"] }
# Walk `current_a` through its configured range in fixed increments on each publish.
current_a = { walk = { type = "int", min = 0, max = 32, step = 8, start = 16 } }
# Recompute `session_kwh` from the previous value so it keeps accumulating over time.
session_kwh = { expr = "(prev or 0) + uniform(0, 0.4)" }


# Stream: solar_inverter
# Topic: smart-home/energy/solar-inverter/output
[[streams]]
name = "solar_inverter"
client = "main"
topic = "smart-home/energy/solar-inverter/output"
every = "1300ms"

# Inline JSON payload for this stream.
[streams.payload.json]
# Use an expression to give `pv_power_w` a repeating wave instead of flat random noise.
pv_power_w = { expr = "2500 + 1200 * math.sin(count / 4)" }
# Sample `grid_export_w` randomly inside the configured range on each publish.
grid_export_w = { random = { type = "int", min = 0, max = 1500 } }


# Stream: home_battery
# Topic: smart-home/energy/home-battery/state
[[streams]]
name = "home_battery"
client = "main"
topic = "smart-home/energy/home-battery/state"
every = "1800ms"
retain = true

# Inline JSON payload for this stream.
[streams.payload.json]
# Walk `soc_pct` through its configured range in fixed increments instead of pure random jumps.
soc_pct = { walk = { type = "int", min = 20, max = 95, step = 3, start = 55 } }
# Choose `mode` from a small set of named states or labels on each publish.
mode = { pick = ["charge", "discharge", "standby"] }
# Sample `power_w` randomly inside a plausible range for this kind of telemetry.
power_w = { random = { type = "int", min = -3000, max = 3000 } }


# Stream: grid_meter
# Topic: smart-home/energy/grid-meter/summary
[[streams]]
name = "grid_meter"
client = "main"
topic = "smart-home/energy/grid-meter/summary"
every = "2200ms"

# Inline JSON payload for this stream.
[streams.payload.json]
# Sample `import_w` randomly inside the configured range on each publish.
import_w = { random = { type = "int", min = 0, max = 4500 } }
# Sample `export_w` randomly inside the configured range on each publish.
export_w = { random = { type = "int", min = 0, max = 2500 } }
# Choose `tariff` from a small set of named states or labels on each publish.
tariff = { pick = ["off_peak", "mid_peak", "on_peak"] }
