# Example: Access and Security
# Combines lock, garage, motion, doorbell, and window-contact events for a home security scenario.
# Comments point out the important pieces so you can copy just the parts you need.
# Full schema reference: https://github.com/marcelo-6/mqtt-sim/tree/main/docs/configuration.md

config_version = 1
name = "Access and Security"

# Broker connection settings. Omit `port` here because the default MQTT port is already 1883.
[brokers.main]
host = "localhost"

# Most examples keep a single named client to stay compact and easy to edit.
[clients.main]
broker = "main"
id = "smart-home-access-and-security-sim"


# Stream: front_door_lock
# Topic: smart-home/security/front-door-lock/state
[[streams]]
name = "front_door_lock"
client = "main"
topic = "smart-home/security/front-door-lock/state"
every = "1200ms"
retain = true

# Inline JSON payload for this stream.
[streams.payload.json]
# Pick a value for `locked` from the configured list each time this stream publishes.
locked = { pick = [true, true, true, false] }
# Walk `battery_pct` through its configured range to mimic a slowly changing battery reading.
battery_pct = { walk = { type = "int", min = 40, max = 100, step = 1, start = 98 } }
# Choose `last_user` from a small set of named states or labels on each publish.
last_user = { pick = ["alice", "bob", "cleaner", "none"] }


# Stream: garage_door
# Topic: smart-home/security/garage-door/state
[[streams]]
name = "garage_door"
client = "main"
topic = "smart-home/security/garage-door/state"
every = "1500ms"
retain = true

# Inline JSON payload for this stream.
[streams.payload.json]
# Step `state` through a repeating sequence so this stream follows a recognizable progression.
state = { seq = ["closed", "opening", "open", "closing", "closed"] }
# Walk `position_pct` through its configured range in fixed increments instead of pure random jumps.
position_pct = { walk = { type = "int", min = 0, max = 100, step = 25, start = 0 } }


# Stream: hall_motion
# Topic: smart-home/security/hall-motion/event
[[streams]]
name = "hall_motion"
client = "main"
topic = "smart-home/security/hall-motion/event"
every = "600ms"

# Inline JSON payload for this stream.
[streams.payload.json]
# Pick a value for `motion` from the configured list each time this stream publishes.
motion = { pick = [false, false, false, true] }
# Sample `lux` randomly inside a plausible range for this kind of telemetry.
lux = { random = { type = "int", min = 5, max = 280 } }


# Stream: doorbell_events
# Topic: smart-home/security/doorbell/event
[[streams]]
name = "doorbell_events"
client = "main"
topic = "smart-home/security/doorbell/event"
every = "2500ms"

# Sequence payload: cycles through known values to emulate a deterministic event flow.
[streams.payload.sequence]
format = "json"
items = [
  { event = "idle", pressed = false },
  { event = "ring", pressed = true, by = "visitor" },
  { event = "idle", pressed = false },
  { event = "motion", pressed = false },
]


# Stream: window_contact_kitchen
# Topic: smart-home/security/window-contact/kitchen
[[streams]]
name = "window_contact_kitchen"
client = "main"
topic = "smart-home/security/window-contact/kitchen"
every = "1700ms"
retain = true

# Inline JSON payload for this stream.
[streams.payload.json]
# Flip `open` between true and false on each publish.
open = { toggle = false }
# Pick a value for `tamper` from the configured list each time this stream publishes.
tamper = { pick = [false, false, false, false, true] }
