# Example: Home Climate and Lighting
# Shows climate, lighting, humidity, and occupancy streams in a compact smart-home example.
# Comments point out the important pieces so you can copy just the parts you need.
# Full schema reference: https://github.com/marcelo-6/mqtt-sim/tree/main/docs/configuration.md

config_version = 1
name = "Home Climate and Lighting"

# Broker connection settings. Omit `port` here because the default MQTT port is already 1883.
[brokers.main]
host = "localhost"

# Most examples keep a single named client to stay compact and easy to edit.
[clients.main]
broker = "main"
id = "smart-home-home-climate-and-lighting-sim"


# Stream: thermostat_living_room
# Topic: smart-home/thermostat/living-room/state
[[streams]]
name = "thermostat_living_room"
client = "main"
topic = "smart-home/thermostat/living-room/state"
every = "2s"
retain = true

# Inline JSON payload for this stream.
[streams.payload.json]
# Choose `mode` from a small set of named states or labels on each publish.
mode = { pick = ["heat", "cool", "auto", "idle"] }
# Walk `setpoint_c` through its configured range in fixed increments on each publish.
setpoint_c = { walk = { type = "float", min = 20, max = 24, step = 0.5, start = 21 } }
# Evaluate `ambient_c` from an expression on each publish for slightly more realistic movement.
ambient_c = { expr = "(prev or 21.2) + uniform(-0.2, 0.2)" }
# Stamp `ts` with the current ISO8601 time for human-friendly debugging.
ts = { time = "iso" }


# Stream: light_living_room
# Topic: smart-home/lights/living-room/state
[[streams]]
name = "light_living_room"
client = "main"
topic = "smart-home/lights/living-room/state"
every = "1s"
retain = true

# Inline JSON payload for this stream.
[streams.payload.json]
# Flip `on` between true and false on each publish.
on = { toggle = true }
# Sample `brightness_pct` randomly inside the configured range on each publish.
brightness_pct = { random = { type = "int", min = 15, max = 100 } }
# Choose `scene` from a small set of named states or labels on each publish.
scene = { pick = ["relax", "reading", "movie", "off"] }


# Stream: light_bedroom
# Topic: smart-home/lights/bedroom/state
[[streams]]
name = "light_bedroom"
client = "main"
topic = "smart-home/lights/bedroom/state"
every = "1500ms"
retain = true

# Inline JSON payload for this stream.
[streams.payload.json]
# Flip `on` between true and false on each publish.
on = { toggle = false }
# Walk `brightness_pct` through its configured range in fixed increments instead of pure random jumps.
brightness_pct = { walk = { type = "int", min = 0, max = 80, step = 20, start = 20 } }
# Pick a value for `color_temp_k` from the configured list each time this stream publishes.
color_temp_k = { pick = [2700, 3000, 3500, 4000] }


# Stream: humidity_living_room
# Topic: smart-home/sensors/living-room/humidity
[[streams]]
name = "humidity_living_room"
client = "main"
topic = "smart-home/sensors/living-room/humidity"
every = "3s"

# Inline JSON payload for this stream.
[streams.payload.json]
# Sample `relative_humidity_pct` randomly inside a plausible range for this kind of telemetry.
relative_humidity_pct = { random = { type = "float", min = 35, max = 55, precision = 1 } }
# Walk `battery_pct` through its configured range to mimic a slowly changing battery reading.
battery_pct = { walk = { type = "int", min = 60, max = 100, step = 1, start = 100 } }


# Stream: occupancy_entryway
# Topic: smart-home/sensors/entryway/occupancy
[[streams]]
name = "occupancy_entryway"
client = "main"
topic = "smart-home/sensors/entryway/occupancy"
every = "800ms"

# Inline JSON payload for this stream.
[streams.payload.json]
# Pick a value for `occupied` from the configured list each time this stream publishes.
occupied = { pick = [true, false, false, false] }
# Recompute `motion_count` from the previous value so it keeps accumulating over time.
motion_count = { expr = "(prev or 0) + randint(0, 2)" }
