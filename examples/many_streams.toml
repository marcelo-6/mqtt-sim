# Example: Many Streams
# Stress-tests multiple stream templates in one file with both list and range expansion.
# Comments point out the important pieces so you can copy just the parts you need.
# Full schema reference: https://github.com/marcelo-6/mqtt-sim/tree/main/docs/configuration.md

config_version = 1
name = "Many Streams"

# Broker connection settings. Omit `port` here because the default MQTT port is already 1883.
[brokers.main]
host = "localhost"

# Most examples keep a single named client to stay compact and easy to edit.
[clients.main]
broker = "main"
id = "many-streams-sim"


# Stream: site/{site}/rack/telemetry
# Topic: site/${site}/rack/telemetry
[[streams]]
client = "main"
topic = "site/${site}/rack/telemetry"
every = "500ms"

# Expand this template into multiple concrete streams.
[streams.expand]
site = { list = ["north", "south", "west"] }

# Inline JSON payload for this stream.
[streams.payload.json]
# Walk `voltage` through its configured range in fixed increments on each publish.
voltage = { walk = { type = "float", min = 110, max = 125, step = 0.5 } }
# Stamp `stamp` with the current ISO8601 time.
stamp = { time = "iso" }


# Stream: replay/{id}
# Topic: replay/${id}
[[streams]]
client = "main"
topic = "replay/${id}"
every = "250ms"

# Expand this template into multiple concrete streams.
[streams.expand]
id = { range = [1, 10] }

# Sequence payload: cycles through known values to emulate a deterministic event.
[streams.payload.sequence]
items = [
  "ON",
  "OFF",
  "WARN",
]
